name: CI

# Build di verifica su ogni push e pull request verso main.
# I tag sono esclusi: il rilascio e' gestito da release.yml per non duplicare.
on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore ControllerWarcraft.slnx

      - name: Build (Release) della solution
        run: dotnet build ControllerWarcraft.slnx -c Release --no-restore
