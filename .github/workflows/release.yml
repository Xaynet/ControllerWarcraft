name: Release

# Rilascio automatico su push di un tag SemVer (es. v0.1.0).
# Compila, pubblica l'app self-contained win-x64 single-file, la comprime
# in uno zip versionato e crea la GitHub Release allegandolo.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # Progetto principale (deliverable Fase 1). Vedi RELEASING.md se il path cambia.
  PROJECT_PATH: 'src/ControllerWarcraft.App/ControllerWarcraft.App.csproj'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Deriva la versione dal tag
        id: version
        shell: pwsh
        run: |
          # github.ref_name e' il nome del tag, es. "v0.1.0". Rimuovi la "v" iniziale.
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Versione derivata dal tag: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Publish (self-contained win-x64, single-file)
        shell: pwsh
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -p:AssemblyVersion=${{ steps.version.outputs.version }} `
            -p:FileVersion=${{ steps.version.outputs.version }} `
            -o publish

      - name: Comprimi in zip versionato
        id: package
        shell: pwsh
        run: |
          $zip = "ControllerWarcraft-v${{ steps.version.outputs.version }}-win-x64.zip"
          Compress-Archive -Path "publish/*" -DestinationPath $zip -Force
          Write-Host "Creato archivio: $zip"
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Crea la GitHub Release e allega lo zip
        uses: softprops/action-gh-release@v2
        with:
          name: ControllerWarcraft ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
