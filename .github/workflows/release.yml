name: Release

# Rilascio automatico su push di un tag SemVer (es. v0.1.0).
# Pubblica i due eseguibili self-contained win-x64 single-file:
#   - cwapp.exe  (runtime; include per referenza Core + Overlay)
#   - cwgui.exe  (editor dei profili di remap; WPF, include Core)
# Assembla uno zip versionato con i due exe, la cartella profiles/ condivisa (inclusi i preset di
# classe in profiles/classes/) e il companion addon opzionale in addon/, poi crea la GitHub Release.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # Deliverable eseguibili. Overlay e Core sono librerie: entrano come dipendenze
  # transitive pubblicando questi due progetti. Vedi RELEASING.md.
  APP_PATH: 'src/ControllerWarcraft.App/ControllerWarcraft.App.csproj'
  GUI_PATH: 'src/ControllerWarcraft.Gui/ControllerWarcraft.Gui.csproj'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Deriva la versione dal tag
        id: version
        shell: pwsh
        run: |
          # github.ref_name e' il nome del tag, es. "v0.1.0". Rimuovi la "v" iniziale.
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Versione derivata dal tag: $version"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish App e Gui (self-contained win-x64, single-file)
        shell: pwsh
        run: |
          $common = @(
            '-c', 'Release',
            '-r', 'win-x64',
            '--self-contained', 'true',
            '-p:PublishSingleFile=true',
            '-p:IncludeNativeLibrariesForSelfExtract=true',
            # Niente .pdb accanto agli exe: mantiene le cartelle di publish pulite.
            '-p:DebugType=none',
            '-p:DebugSymbols=false',
            "-p:Version=${{ steps.version.outputs.version }}",
            "-p:AssemblyVersion=${{ steps.version.outputs.version }}",
            "-p:FileVersion=${{ steps.version.outputs.version }}"
          )
          dotnet publish "${{ env.APP_PATH }}" @common -o publish/app
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dotnet publish "${{ env.GUI_PATH }}" @common -o publish/gui
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Assembla il pacchetto (exe + profiles condivisi)
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stageName = "ControllerWarcraft-v$version-win-x64"
          $stage = Join-Path 'staging' $stageName
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          # I due eseguibili self-contained (ognuno e' autosufficiente).
          Copy-Item 'publish/app/cwapp.exe' -Destination $stage
          Copy-Item 'publish/gui/cwgui.exe' -Destination $stage

          # Preset di profili condivisi: una sola copia autorevole dal repo.
          # Entrambi gli exe cercano i preset in <exe>/profiles.
          New-Item -ItemType Directory -Force -Path (Join-Path $stage 'profiles') | Out-Null
          Copy-Item 'profiles/*.json' -Destination (Join-Path $stage 'profiles')

          # Fase 4: preset di classe (override) in profiles/classes/.
          New-Item -ItemType Directory -Force -Path (Join-Path $stage 'profiles/classes') | Out-Null
          Copy-Item 'profiles/classes/*.json' -Destination (Join-Path $stage 'profiles/classes') -ErrorAction SilentlyContinue

          # Fase 4: companion addon OPZIONALE (WoW/Lua). Incluso nello zip perché piccolo e
          # self-contained; NON è richiesto per usare l'app (va copiato manualmente in Interface/AddOns).
          Copy-Item 'addon' -Destination (Join-Path $stage 'addon') -Recurse -ErrorAction SilentlyContinue

          # Documentazione utile accanto ai binari.
          Copy-Item 'RELEASING.md' -Destination $stage -ErrorAction SilentlyContinue
          Copy-Item 'profiles/README.md' -Destination (Join-Path $stage 'profiles') -ErrorAction SilentlyContinue

          Write-Host "Contenuto del pacchetto:"
          Get-ChildItem -Recurse $stage | Select-Object FullName

          $zip = "$stageName.zip"
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath $zip -Force
          Write-Host "Creato archivio: $zip"
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Crea la GitHub Release e allega lo zip
        uses: softprops/action-gh-release@v2
        with:
          name: ControllerWarcraft ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
